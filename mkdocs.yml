site_name: climasus_readdbc_py
site_description: Pure-Python DBC/DBF reader for DATASUS files
site_url: https://climasus.github.io/climasus_readdbc_py/
repo_url: https://github.com/climasus/climasus_readdbc_py
repo_name: climasus/climasus_readdbc_py
docs_dir: docs
site_dir: site

# ---------------------------------------------------------------------------
# Theme — Material with CLIMA-SUS identity
# ---------------------------------------------------------------------------
theme:
  name: material
  language: pt
  logo: assets/logo.png
  favicon: assets/logo.png

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Modo claro

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

extra_css:
  - assets/climasus.css

extra_javascript:
  - assets/climasus.js

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
            show_signature_annotations: true
            separate_signature: true

# ---------------------------------------------------------------------------
# Markdown extensions
# ---------------------------------------------------------------------------
markdown_extensions:
  - admonition
  - tables
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

# ---------------------------------------------------------------------------
# Extra
# ---------------------------------------------------------------------------
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/climasus
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/climasus_readdbc_py/

copyright: "© 2024 CLIMA-SUS — MIT License"

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
nav:
  - Início: index.md
  - Instalação: installation.md
  - Uso: usage.md
  - Referência da API: reference/
