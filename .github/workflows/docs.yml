name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy MkDocs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: pip install -r requirements-docs.txt

      - name: Install package
        run: pip install -e .

      - name: Fetch design-system logo
        run: |
          mkdir -p docs/assets
          curl -fsSL \
            "https://climasus.github.io/design-system/assets/logos/logo-symbol.png" \
            -o docs/assets/logo.png || echo "WARN: could not fetch logo.png"

      - name: Build and deploy to GitHub Pages
        run: mkdocs gh-deploy --force --clean
